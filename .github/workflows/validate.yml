name: Validate public artifacts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m compileall -q mnist prompting scaling Paper/Reproducibility
      - name: Verify headline statistics
        run: python Paper/Reproducibility/verify_headlines.py
